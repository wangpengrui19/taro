<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#1a0942" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json" />

    <!-- iOS Safari 特定配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="塔罗初学之旅" />

    <!-- iOS 图标配置 - 多个尺寸确保兼容 -->
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-192.png" />

    <!-- 防止iOS使用自动生成的图标 -->
    <link rel="mask-icon" href="./icons/icon-192.png" color="#1a0942" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-192.png" />

    <!-- Windows Tiles -->
    <meta name="msapplication-TileImage" content="./icons/icon-192.png" />
    <meta name="msapplication-TileColor" content="#1a0942" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>塔罗初学之旅</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
